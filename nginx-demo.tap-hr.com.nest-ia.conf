# =====================================
# HTTP -> HTTPS Redirect
# =====================================
server {
    listen 80;
    server_name demo.tap-hr.com;

    return 301 https://$host$request_uri;
}

# =====================================
# HTTPS Server + Reverse Proxy
# Frontend (Next.js): 3111
# Backend API (NestJS): 3112
# Backend IA (Flask): 5002
# =====================================
server {
    listen 443 ssl http2;
    server_name demo.tap-hr.com;

    ssl_certificate /etc/letsencrypt/live/demo.tap-hr.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/demo.tap-hr.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/demo-access.log;
    error_log /var/log/nginx/demo-error.log;

    # -----------------------------------------
    # Backend NestJS expose sous /api/*
    # ex: /api/auth/login -> Nest reçoit /auth/login
    # -----------------------------------------
    location /api/ {
        client_max_body_size 100M;
        rewrite ^/api(.*)$ $1 break;
        proxy_pass http://127.0.0.1:3112;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location = /api {
        return 301 $scheme://$host/api/;
    }

    # -----------------------------------------
    # Backend IA Flask expose sous /ia/*
    # ex: /ia/api/offres/embed -> Flask reçoit /api/offres/embed
    # -----------------------------------------
    location /ia/ {
        client_max_body_size 100M;
        rewrite ^/ia(.*)$ $1 break;
        proxy_pass http://127.0.0.1:5002;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location = /ia {
        return 301 $scheme://$host/ia/;
    }

    # Routes IA appelées directement via URL publique
    # (QR, CV, assets portfolio/talent, endpoints d'agents, etc.)
    location ~ ^/(recruit|correctedcv|minio-proxy|portfolio|talent|agent[0-9]+)(/.*)?$ {
        client_max_body_size 100M;
        proxy_pass http://127.0.0.1:5002;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # -----------------------------------------
    # Frontend Next.js (fallback)
    # -----------------------------------------
    location / {
        proxy_pass http://127.0.0.1:3111;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
